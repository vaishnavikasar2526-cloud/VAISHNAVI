<!DOCTYPE html>
<html>
<head>
<title>JavaScript Programs</title>

<script>

// Arithmetic Operations
function arithmetic() {
    let a = parseInt(prompt("Enter first number:"));
    let b = parseInt(prompt("Enter second number:"));

    let add = a + b;
    let sub = a - b;
    let mul = a * b;
    let div = a / b;

    document.getElementById("output").innerHTML =
    "Addition: " + add + "<br>" +
    "Subtraction: " + sub + "<br>" +
    "Multiplication: " + mul + "<br>" +
    "Division: " + div;
}

// Conditional Statement
function checkNumber() {
    let num = parseInt(prompt("Enter a number:"));
    let result = "";

    if(num > 0){
        result = "Number is Positive";
    }
    else if(num < 0){
        result = "Number is Negative";
    }
    else{
        result = "Number is Zero";
    }

    document.getElementById("output").innerHTML = result;
}

// Loop Example
function showLoop() {
    let n = parseInt(prompt("Enter a number for loop:"));
    let text = "";

    for(let i=1; i<=n; i++){
        text += i + " ";
    }

    document.getElementById("output").innerHTML =
    "Numbers from 1 to " + n + ": <br>" + text;
}

</script>

<style>
body{
    font-family: Arial;
    text-align: center;
    background-color:#f2f2f2;
}

.container{
    width:400px;
    margin:auto;
    background:white;
    padding:20px;
    margin-top:50px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

button{
    padding:10px;
    margin:10px;
    width:200px;
}

#output{
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>JavaScript Programs</h2>

<button onclick="arithmetic()">Arithmetic Operations</button><br>

<button onclick="checkNumber()">Conditional Statement</button><br>

<button onclick="showLoop()">Loop Example</button>

<div id="output"></div>

</div>

</body>
</html>
