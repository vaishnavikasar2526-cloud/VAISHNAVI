<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Programs</title>
</head>
<body>

<h2>JavaScript Programs: Arithmetic, Conditional, and Loops</h2>

<script>
    // Arithmetic Operations
    let a = 10;
    let b = 5;

    document.write("<h3>Arithmetic Operations</h3>");
    document.write("a = " + a + ", b = " + b + "<br>");
    document.write("Addition: " + (a + b) + "<br>");
    document.write("Subtraction: " + (a - b) + "<br>");
    document.write("Multiplication: " + (a * b) + "<br>");
    document.write("Division: " + (a / b) + "<br>");
    document.write("Modulus: " + (a % b) + "<br>");

    // Conditional Statement
    let number = 7;

    document.write("<h3>Conditional Statement</h3>");
    if (number % 2 == 0) {
        document.write(number + " is Even<br>");
    } else {
        document.write(number + " is Odd<br>");
    }

    // Loop Example
    document.write("<h3>Loop Example (For Loop)</h3>");
    for (let i = 1; i <= 5; i++) {
        document.write("Number: " + i + "<br>");
    }
</script>

</body>
</html>
